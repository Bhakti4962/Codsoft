<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>

    /* ===== Page Styling ===== */
    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:linear-gradient(135deg,#00c6ff,#000000);
        font-family:Arial;
    }
    
    /* ===== Calculator Box ===== */
    .calculator{
        background:rgb(151, 203, 228);
        padding:20px;
        border-radius:15px;
        width:270px;
        box-shadow:0 0 20px rgba(0,0,0,0.3);
    }
    
    /* ===== Display ===== */
    #display{
        width:100%;
        height:55px;
        margin-bottom:15px;
        font-size:24px;
        text-align:right;
        padding:10px;
        border:none;
        border-radius:8px;
        background:#fdfefe;
    }
    
    /* ===== Button Grid ===== */
    .buttons{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px;
    }
    
    /* ===== Buttons ===== */
    button{
        padding:15px;
        font-size:18px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        background:#e0e0e0;
        transition:0.3s;
    }
    
    button:hover{
        transform:scale(1.05);
    }
    
    /* ===== Operators ===== */
    .operator{
        background:#ff9800;
        color:white;
    }
    
    /* ===== Equal Button ===== */
    .equal{
        background:#4caf50;
        color:white;
    }
    
    /* ===== Clear Button ===== */
    .clear{
        background:#f44336;
        color:white;
    }
    
    </style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" disabled>

<div class="buttons">

<button>7</button>
<button>8</button>
<button>9</button>
<button class="operator">/</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button class="operator">*</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button class="operator">-</button>

<button>0</button>
<button>.</button>
<button class="equal">=</button>
<button class="operator">+</button>

<button class="clear">C</button>

</div>
</div>

<script>

let display = document.getElementById("display");
let buttons = document.querySelectorAll("button");

let expression = "";

/* ===== Event Listener ===== */
buttons.forEach(button => {

    button.addEventListener("click", () => {

        let value = button.innerText;

        if(value === "C"){
            expression = "";
            display.value = "";
        }

        else if(value === "="){
            try{
                expression = eval(expression);
                display.value = expression;
            }
            catch{
                display.value = "Error";
                expression = "";
            }
        }

        else{
            expression += value;
            display.value = expression;
        }

    });

});

</script>

</body>
</html>
